<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" role="img">
  <title>Rejection Block</title>
  <desc>Long lower wicks sweep sell-side liquidity while the candle bodies hold above it. That body range is the rejection block, and price reverses away from it.</desc>

  <style>
    .ttl  { font: 700 15px system-ui, -apple-system, sans-serif; fill: #E8EAED }
    .sub  { font: 500 12px system-ui, -apple-system, sans-serif; fill: #9AA0A6 }
    .cap  { font: 700 10.5px system-ui, -apple-system, sans-serif; fill: #9AA0A6; letter-spacing: .07em }
    .tag  { font: 700 12px system-ui, -apple-system, sans-serif; fill: #A78BFA; letter-spacing: .06em }
    .up   { fill: #22C55E }
    .dn   { fill: #EF4444 }
    .wick { stroke: #9AA0A6; stroke-width: 2.2 }
    .ssl  { stroke: #E8EAED; stroke-width: 1.6 }
  </style>

  <rect x="0" y="0" width="720" height="400" rx="12" fill="#0E1420"/>

  <text class="ttl" x="40" y="30">Rejection Block</text>
  <text class="sub" x="40" y="50">The wicks sweep the low. The bodies are the block.</text>

  <!-- The block: the body range at the extreme, not the wicks -->
  <rect x="150" y="248" width="500" height="44" fill="#A78BFA" fill-opacity=".16" stroke="#A78BFA" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text class="tag" x="660" y="266" text-anchor="end">RB</text>

  <!-- Sell-side liquidity, taken by the wicks below the block -->
  <line class="ssl" x1="60" y1="336" x2="660" y2="336"/>
  <text class="cap" x="60" y="352">SSL — SELL-SIDE LIQUIDITY</text>

  <!-- Selling into the low -->
  <line class="wick" x1="85"  y1="118" x2="85"  y2="200"/><rect class="dn" x="75"  y="130" width="21" height="62" rx="1.5"/>
  <line class="wick" x1="135" y1="158" x2="135" y2="262"/><rect class="dn" x="125" y="170" width="21" height="82" rx="1.5"/>

  <!-- Wicks pierce SSL, bodies stay inside the block -->
  <line class="wick" x1="190" y1="205" x2="190" y2="334"/><rect class="dn" x="180" y="252" width="21" height="38" rx="1.5"/>
  <line class="wick" x1="245" y1="246" x2="245" y2="336"/><rect class="dn" x="235" y="256" width="21" height="32" rx="1.5"/>
  <line class="wick" x1="300" y1="240" x2="300" y2="332"/><rect class="up" x="290" y="252" width="21" height="36" rx="1.5"/>

  <!-- Reversal away from the block -->
  <line class="wick" x1="355" y1="196" x2="355" y2="272"/><rect class="up" x="345" y="208" width="21" height="56" rx="1.5"/>
  <line class="wick" x1="410" y1="150" x2="410" y2="228"/><rect class="up" x="400" y="162" width="21" height="58" rx="1.5"/>
  <line class="wick" x1="465" y1="112" x2="465" y2="188"/><rect class="up" x="455" y="124" width="21" height="56" rx="1.5"/>
  <line class="wick" x1="520" y1="82"  x2="520" y2="152"/><rect class="up" x="510" y="94"  width="21" height="50" rx="1.5"/>
</svg>

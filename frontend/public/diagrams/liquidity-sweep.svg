<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380" role="img">
  <title>Liquidity Sweep</title>
  <desc>The level breaks, then it does not. That is the tell.</desc>
  <style>
  .t{font:700 15px system-ui,-apple-system,sans-serif;fill:#E8EAED}
  .s{font:500 12px system-ui,-apple-system,sans-serif;fill:#9AA0A6}
  .c{font:700 10.5px system-ui,-apple-system,sans-serif;fill:#9AA0A6;letter-spacing:.07em}
  .b{font:700 11px system-ui,-apple-system,sans-serif;fill:#3B82F6;letter-spacing:.06em}
  .p{font:700 11px system-ui,-apple-system,sans-serif;fill:#A78BFA;letter-spacing:.06em}
  .g{font:700 11px system-ui,-apple-system,sans-serif;fill:#22C55E;letter-spacing:.06em}
  .r{font:700 11px system-ui,-apple-system,sans-serif;fill:#EF4444;letter-spacing:.06em}
  .w{stroke:#9AA0A6;stroke-width:2.2}
  .lv{stroke:#6B7280;stroke-width:1.4;stroke-dasharray:6 5}
</style>
  <rect x="0" y="0" width="720" height="380" rx="12" fill="#0E1420"/>
  <text class="t" x="40" y="30">Liquidity Sweep</text>
  <text class="s" x="40" y="50">The level breaks, then it does not. That is the tell.</text>
<line x1="60" y1="290" x2="660" y2="290" stroke="#E8EAED" stroke-width="1.5"/><text class="c" x="60" y="312">EQUAL LOWS — STOPS SIT HERE</text><line class="w" x1="110" y1="130" x2="110" y2="200"/><rect x="99.5" y="145" width="21" height="45" rx="1.5" fill="#EF4444"/><line class="w" x1="165" y1="165" x2="165" y2="250"/><rect x="154.5" y="178" width="21" height="62" rx="1.5" fill="#EF4444"/><line class="w" x1="220" y1="205" x2="220" y2="286"/><rect x="209.5" y="220" width="21" height="58" rx="1.5" fill="#EF4444"/><line class="w" x1="275" y1="250" x2="275" y2="345"/><rect x="264.5" y="262" width="21" height="26" rx="1.5" fill="#EF4444"/><text class="p" x="292" y="336">the wick takes them out —</text><text class="p" x="292" y="352">the candle closes back above</text><line class="w" x1="330" y1="200" x2="330" y2="285"/><rect x="319.5" y="215" width="21" height="53" rx="1.5" fill="#22C55E"/><line class="w" x1="385" y1="150" x2="385" y2="240"/><rect x="374.5" y="165" width="21" height="57" rx="1.5" fill="#22C55E"/><line class="w" x1="440" y1="110" x2="440" y2="195"/><rect x="429.5" y="125" width="21" height="55" rx="1.5" fill="#22C55E"/><line class="w" x1="495" y1="82" x2="495" y2="158"/><rect x="484.5" y="95" width="21" height="45" rx="1.5" fill="#22C55E"/>
</svg>

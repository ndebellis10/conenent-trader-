<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380" role="img">
  <title>Market Structure</title>
  <desc>Three ways price moves. We trade the first two.</desc>
  <style>
  .t{font:700 15px system-ui,-apple-system,sans-serif;fill:#E8EAED}
  .s{font:500 12px system-ui,-apple-system,sans-serif;fill:#9AA0A6}
  .c{font:700 10.5px system-ui,-apple-system,sans-serif;fill:#9AA0A6;letter-spacing:.07em}
  .b{font:700 11px system-ui,-apple-system,sans-serif;fill:#3B82F6;letter-spacing:.06em}
  .p{font:700 11px system-ui,-apple-system,sans-serif;fill:#A78BFA;letter-spacing:.06em}
  .g{font:700 11px system-ui,-apple-system,sans-serif;fill:#22C55E;letter-spacing:.06em}
  .r{font:700 11px system-ui,-apple-system,sans-serif;fill:#EF4444;letter-spacing:.06em}
  .w{stroke:#9AA0A6;stroke-width:2.2}
  .lv{stroke:#6B7280;stroke-width:1.4;stroke-dasharray:6 5}
</style>
  <rect x="0" y="0" width="720" height="380" rx="12" fill="#0E1420"/>
  <text class="t" x="40" y="30">Market Structure</text>
  <text class="s" x="40" y="50">Three ways price moves. We trade the first two.</text>
<polyline points="60,300 90,210 115,250 150,150 175,195 210,100 240,130" fill="none" stroke="#22C55E" stroke-width="2.6" stroke-linejoin="round"/><text class="g" x="90" y="200" text-anchor="middle">HH</text><text class="g" x="150" y="140" text-anchor="middle">HH</text><text class="g" x="210" y="90" text-anchor="middle">HH</text><text class="g" x="115" y="272" text-anchor="middle">HL</text><text class="g" x="175" y="217" text-anchor="middle">HL</text><polyline points="275,110 305,200 330,160 365,260 390,220 425,310 455,280" fill="none" stroke="#EF4444" stroke-width="2.6" stroke-linejoin="round"/><text class="r" x="305" y="222" text-anchor="middle">LH</text><text class="r" x="365" y="282" text-anchor="middle">LH</text><text class="r" x="330" y="150" text-anchor="middle">LL</text><text class="r" x="390" y="210" text-anchor="middle">LL</text><text class="r" x="425" y="332" text-anchor="middle">LL</text><polyline points="490,250 520,160 550,250 580,160 610,250 640,160 670,250" fill="none" stroke="#9AA0A6" stroke-width="2.6" stroke-linejoin="round"/><line x1="490" y1="160" x2="680" y2="160" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="6 5"/><line x1="490" y1="250" x2="680" y2="250" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="6 5"/><text class="c" x="60"  y="355">UPTREND — HH + HL</text><text class="c" x="275" y="355">DOWNTREND — LH + LL</text><text class="c" x="490" y="355">RANGE — WE STAY AWAY</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420" role="img">
  <title>Inversed Fair Value Gap</title>
  <desc>A bullish fair value gap forms, price later closes back through it, and the gap flips to resistance. Entry at the gap, stop above the swing high, target the draw on liquidity.</desc>

  <style>
    .ttl  { font: 700 15px system-ui, -apple-system, sans-serif; fill: #E8EAED }
    .seq  { font: 600 12px system-ui, -apple-system, sans-serif; fill: #60A5FA; letter-spacing: .02em }
    .cap  { font: 700 10.5px system-ui, -apple-system, sans-serif; fill: #9AA0A6; letter-spacing: .07em }
    .capg { font: 700 10.5px system-ui, -apple-system, sans-serif; fill: #22C55E; letter-spacing: .07em }
    .capr { font: 700 10.5px system-ui, -apple-system, sans-serif; fill: #EF4444; letter-spacing: .07em }
    .up   { fill: #22C55E }
    .dn   { fill: #EF4444 }
    .wick { stroke: #9AA0A6; stroke-width: 2.2 }
    .lvl  { stroke: #6B7280; stroke-width: 1.4; stroke-dasharray: 6 5 }
    .ent  { stroke: #3B82F6; stroke-width: 2.2; fill: none }
  </style>

  <rect x="0" y="0" width="720" height="420" rx="12" fill="#0E1420"/>

  <text class="ttl" x="40" y="30">Inversed Fair Value Gap</text>
  <text class="seq" x="40" y="50">Liquidity Sweep → Displacement → Inversion → Clear DOL</text>

  <!-- The gap: support while price holds above it, resistance once price closes below -->
  <rect x="60"  y="205" width="295" height="45" fill="#22C55E" fill-opacity=".13" stroke="#22C55E" stroke-width="1.4" stroke-dasharray="5 4"/>
  <rect x="355" y="205" width="265" height="45" fill="#EF4444" fill-opacity=".13" stroke="#EF4444" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text class="capg" x="200" y="232">FVG — SUPPORT</text>
  <text class="capr" x="361" y="200">INVERSED — NOW RESISTANCE</text>

  <!-- Stop and target levels -->
  <line class="lvl" x1="60" y1="112" x2="660" y2="112"/>
  <text class="cap" x="60" y="105">STOP — ABOVE THE SWING HIGH</text>
  <line class="lvl" x1="60" y1="392" x2="660" y2="392"/>
  <text class="cap" x="60" y="386">TARGET — DRAW ON LIQUIDITY</text>

  <!-- Gap forms -->
  <line class="wick" x1="80"  y1="250" x2="80"  y2="330"/><rect class="up" x="70"  y="268" width="21" height="54" rx="1.5"/>
  <line class="wick" x1="130" y1="165" x2="130" y2="310"/><rect class="up" x="120" y="180" width="21" height="115" rx="1.5"/>
  <line class="wick" x1="180" y1="140" x2="180" y2="205"/><rect class="up" x="170" y="152" width="21" height="46" rx="1.5"/>

  <!-- Push up, then roll over -->
  <line class="wick" x1="230" y1="120" x2="230" y2="190"/><rect class="up" x="220" y="132" width="21" height="50" rx="1.5"/>
  <line class="wick" x1="280" y1="116" x2="280" y2="200"/><rect class="dn" x="270" y="128" width="21" height="64" rx="1.5"/>
  <line class="wick" x1="330" y1="150" x2="330" y2="240"/><rect class="dn" x="320" y="162" width="21" height="70" rx="1.5"/>

  <!-- Closes THROUGH the gap — this is the inversion -->
  <line class="wick" x1="380" y1="195" x2="380" y2="290"/><rect class="dn" x="370" y="208" width="21" height="74" rx="1.5"/>

  <!-- Retest from below, rejected -->
  <line class="wick" x1="430" y1="215" x2="430" y2="300"/><rect class="dn" x="420" y="240" width="21" height="52" rx="1.5"/>

  <!-- Away to target -->
  <line class="wick" x1="480" y1="275" x2="480" y2="355"/><rect class="dn" x="470" y="288" width="21" height="60" rx="1.5"/>
  <line class="wick" x1="530" y1="320" x2="530" y2="390"/><rect class="dn" x="520" y="330" width="21" height="52" rx="1.5"/>

  <!-- Entry at the bottom of the gap being inversed -->
  <line class="ent" x1="466" y1="250" x2="466" y2="300"/>
  <path class="ent" d="M461 294 L466 301 L471 294"/>
  <text class="seq" x="476" y="272">ENTRY</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" width="720" height="410" role="img">
  <title>AMD</title>
  <desc>Accumulation → Manipulation → Distribution. The trap comes before the move.</desc>
  <style>
  .t{font:700 15px system-ui,-apple-system,sans-serif;fill:#E8EAED}
  .s{font:500 12px system-ui,-apple-system,sans-serif;fill:#9AA0A6}
  .c{font:700 10.5px system-ui,-apple-system,sans-serif;fill:#9AA0A6;letter-spacing:.07em}
  .b{font:700 11px system-ui,-apple-system,sans-serif;fill:#3B82F6;letter-spacing:.06em}
  .p{font:700 11px system-ui,-apple-system,sans-serif;fill:#A78BFA;letter-spacing:.06em}
  .g{font:700 11px system-ui,-apple-system,sans-serif;fill:#22C55E;letter-spacing:.06em}
  .r{font:700 11px system-ui,-apple-system,sans-serif;fill:#EF4444;letter-spacing:.06em}
  .w{stroke:#9AA0A6;stroke-width:2.2}
  .lv{stroke:#6B7280;stroke-width:1.4;stroke-dasharray:6 5}
</style>
  <rect x="0" y="0" width="720" height="410" rx="12" fill="#0E1420"/>
  <text class="t" x="40" y="30">AMD</text>
  <text class="s" x="40" y="50">Accumulation → Manipulation → Distribution. The trap comes before the move.</text>
<rect x="60" y="150" width="210" height="130" fill="#9AA0A6" fill-opacity=".10" stroke="#9AA0A6" stroke-width="1.4" stroke-dasharray="5 4" rx="2"/><line x1="60" y1="150" x2="270" y2="150" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="6 5"/><line x1="60" y1="280" x2="270" y2="280" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="6 5"/><polyline points="70,270 100,160 130,272 160,158 190,270 220,160 250,268" fill="none" stroke="#9AA0A6" stroke-width="2.4" stroke-linejoin="round"/><text class="c" x="66" y="142">EQUAL HIGHS</text><text class="c" x="66" y="298">EQUAL LOWS</text><text class="c" x="66" y="362">1 — ACCUMULATION</text><text class="s" x="66" y="380">liquidity builds</text><polyline points="250,268 285,330 320,300" fill="none" stroke="#EF4444" stroke-width="2.8" stroke-linejoin="round"/><rect x="268" y="280" width="62" height="62" fill="#EF4444" fill-opacity=".13" stroke="#EF4444" stroke-width="1.4" stroke-dasharray="5 4" rx="2"/><text class="c" x="278" y="362">2 — MANIPULATION</text><text class="s" x="278" y="380">the low gets swept</text><polyline points="320,300 380,220 420,250 480,140 520,175 580,90 620,110" fill="none" stroke="#22C55E" stroke-width="2.8" stroke-linejoin="round"/><text class="c" x="420" y="362">3 — DISTRIBUTION</text><text class="s" x="420" y="380">the real move</text>

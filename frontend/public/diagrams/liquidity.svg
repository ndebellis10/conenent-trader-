<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380" role="img">
  <title>Liquidity</title>
  <desc>Resting stop-losses. Price reaches for them.</desc>
  <style>
  .t{font:700 15px system-ui,-apple-system,sans-serif;fill:#E8EAED}
  .s{font:500 12px system-ui,-apple-system,sans-serif;fill:#9AA0A6}
  .c{font:700 10.5px system-ui,-apple-system,sans-serif;fill:#9AA0A6;letter-spacing:.07em}
  .b{font:700 11px system-ui,-apple-system,sans-serif;fill:#3B82F6;letter-spacing:.06em}
  .p{font:700 11px system-ui,-apple-system,sans-serif;fill:#A78BFA;letter-spacing:.06em}
  .g{font:700 11px system-ui,-apple-system,sans-serif;fill:#22C55E;letter-spacing:.06em}
  .r{font:700 11px system-ui,-apple-system,sans-serif;fill:#EF4444;letter-spacing:.06em}
  .w{stroke:#9AA0A6;stroke-width:2.2}
  .lv{stroke:#6B7280;stroke-width:1.4;stroke-dasharray:6 5}
</style>
  <rect x="0" y="0" width="720" height="380" rx="12" fill="#0E1420"/>
  <text class="t" x="40" y="30">Liquidity</text>
  <text class="s" x="40" y="50">Resting stop-losses. Price reaches for them.</text>
<rect x="60" y="96" width="600" height="34" fill="#3B82F6" fill-opacity=".13" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="5 4" rx="2"/><text class="b" x="70" y="118">BUY-SIDE LIQUIDITY — STOPS ABOVE THE HIGHS</text><rect x="60" y="288" width="600" height="34" fill="#EF4444" fill-opacity=".13" stroke="#EF4444" stroke-width="1.4" stroke-dasharray="5 4" rx="2"/><text class="r" x="70" y="310">SELL-SIDE LIQUIDITY — STOPS BELOW THE LOWS</text><line x1="60" y1="130" x2="660" y2="130" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="6 5"/><line x1="60" y1="288" x2="660" y2="288" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="6 5"/><line class="w" x1="110" y1="130" x2="110" y2="250"/><rect x="99.5" y="160" width="21" height="75" rx="1.5" fill="#22C55E"/><line class="w" x1="165" y1="148" x2="165" y2="288"/><rect x="154.5" y="175" width="21" height="93" rx="1.5" fill="#EF4444"/><line class="w" x1="220" y1="132" x2="220" y2="262"/><rect x="209.5" y="158" width="21" height="86" rx="1.5" fill="#22C55E"/><line class="w" x1="275" y1="155" x2="275" y2="290"/><rect x="264.5" y="182" width="21" height="90" rx="1.5" fill="#EF4444"/><line class="w" x1="330" y1="131" x2="330" y2="244"/><rect x="319.5" y="152" width="21" height="76" rx="1.5" fill="#22C55E"/><line class="w" x1="385" y1="160" x2="385" y2="289"/><rect x="374.5" y="190" width="21" height="80" rx="1.5" fill="#EF4444"/><line class="w" x1="440" y1="134" x2="440" y2="238"/><rect x="429.5" y="160" width="21" height="60" rx="1.5" fill="#22C55E"/><line class="w" x1="495" y1="150" x2="495" y2="287"/><rect x="484.5" y="178" width="21" height="88" rx="1.5" fill="#EF4444"/><text class="c" x="70" y="352">PRICE RANGES BETWEEN THEM — BOTH POOLS ARE A TARGET</text>
</svg>
